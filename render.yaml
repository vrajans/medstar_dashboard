# render.yaml — InsightHub Blueprint
# Defines BOTH services so Render can deploy them together.
# After connecting your GitHub repo, go to:
#   render.com → New → Blueprint → select this repo

services:
  # ── Service 1: FastAPI backend ─────────────────────────────────
  - type: web
    name: insighthub-api
    runtime: python
    region: singapore       # closest to Chennai
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PG_DSN
        sync: false         # you will paste this from Neon dashboard
      - key: JWT_SECRET
        generateValue: true # Render auto-generates a secure random value
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_MINS
        value: "15"
      - key: REFRESH_TOKEN_DAYS
        value: "7"
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── Service 2: Dash frontend ────────────────────────────────────
  - type: web
    name: insighthub-dash
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FASTAPI_BASE_URL
        sync: false         # you will paste insighthub-api URL after it deploys
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false         # set your own secure password
      - key: VIEWER_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
